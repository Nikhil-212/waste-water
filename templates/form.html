<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry - AquaTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2><i class="fas fa-tint"></i> AquaTrack</h2>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/form" class="active">Data Entry</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/prediction">Prediction</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Water Usage Data Entry</h1>
        <p class="subtitle">Enter water consumption details for analysis</p>

        <div class="form-container">
            <form id="waterForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Time</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tankCapacity">Tank Capacity (liters)</label>
                        <input type="number" id="tankCapacity" name="tankCapacity" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="prevLevel">Previous Water Level (liters)</label>
                        <input type="number" id="prevLevel" name="prevLevel" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="currLevel">Current Water Level (liters)</label>
                        <input type="number" id="currLevel" name="currLevel" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="students">Number of Students</label>
                        <input type="number" id="students" name="students" min="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="area">Usage Area</label>
                        <select id="area" name="area" required>
                            <option value="">Select Area</option>
                            <option value="Bathroom">Bathroom</option>
                            <option value="Kitchen">Kitchen</option>
                            <option value="Laundry">Laundry</option>
                            <option value="Cleaning">Cleaning</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="block">Hostel Block</label>
                        <input type="text" id="block" name="block" placeholder="e.g., Block A" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Submit Data</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
